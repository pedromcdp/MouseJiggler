name: Release

# Triggers on any tag matching v1.0, v1.2.3, etc.
# Create and push one with:
#   git tag v1.1
#   git push origin v1.1
on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          chmod +x build.sh scripts/make_icon.sh
          ./build.sh

      - name: Zip app bundle
        run: |
          cd build
          zip -r "../MouseJiggler-${{ github.ref_name }}.zip" MouseJiggler.app
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MouseJiggler-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
